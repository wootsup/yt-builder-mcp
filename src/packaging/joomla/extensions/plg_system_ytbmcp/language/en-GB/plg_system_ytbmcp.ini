; YT Builder MCP — System Plugin language strings (en-GB)
; Reference Cookbook §6.10 brand convention. Verbatim copy-strings live
; in src/modules/platform-joomla/src/Settings/JoomlaBrandStrings.php so
; both PHP-rendered surfaces (admin component) and these INI keys point
; to one source of truth.

PLG_SYSTEM_YTBMCP="System - YT Builder MCP (unofficial)"
PLG_SYSTEM_YTBMCP_XML_DESCRIPTION="Bootstraps the YT Builder MCP REST surface, registers Web Services API routes for v1/* endpoints, and provides a Joomla-native settings page mounted under com_ytbmcp. Independent third-party plugin, not affiliated with YOOtheme GmbH."

; Uninstall behaviour gate — Audit-A5 P1-1 (Wave 4 fix-round F3).
PLG_SYSTEM_YTBMCP_FIELDSET_UNINSTALL_LABEL="Uninstall behaviour"
PLG_SYSTEM_YTBMCP_FIELDSET_UNINSTALL_DESC="Controls what happens to YT Builder MCP data (signing key, API keys, transients, advisory locks) when the plugin is uninstalled."
PLG_SYSTEM_YTBMCP_FIELD_DELETE_DATA_LABEL="Delete all data on uninstall"
PLG_SYSTEM_YTBMCP_FIELD_DELETE_DATA_DESC="If YES, the installer drops the #__ytb_mcp_options, #__ytb_mcp_transients and #__ytb_mcp_lock tables on uninstall. If NO (default), data survives so a future reinstall recovers the previous signing key and registered API clients. This setting only takes effect at uninstall time — toggling it without uninstalling has no effect."

; com_scheduler routine — Audit-A4 P1-2.
PLG_SYSTEM_YTBMCP_TASK_TRANSIENT_CLEANUP_DESC="Periodically removes expired rows from #__ytb_mcp_transients (RateLimiter buckets, PickupChannel one-shot codes). Recommended schedule: hourly or daily."
