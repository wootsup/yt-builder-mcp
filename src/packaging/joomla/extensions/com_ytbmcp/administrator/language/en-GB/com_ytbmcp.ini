COM_YTBMCP_ABOUT_HEADING="About YT Builder MCP for YOOtheme Pro (unofficial)"
COM_YTBMCP_ABOUT_INTRO_1="Model Context Protocol (MCP) is an open standard that lets AI assistants talk to tools and data. YT Builder MCP exposes a Bearer-authenticated REST dialect of your YOOtheme Pro page builder; the companion NPM server, run locally next to your AI client, translates AI tool-calls into REST requests."
COM_YTBMCP_ABOUT_INTRO_2="Once both halves are configured you can ask Claude, Cursor, ChatGPT and others to read your templates, add or edit elements, bind dynamic sources, and save / publish pages — all under the optimistic-lock + scope-hierarchy guardrails the extension enforces server-side."
COM_YTBMCP_ABOUT_CONNECT="Connect from your AI assistant"
COM_YTBMCP_ABOUT_CONNECT_HINT="Run the setup wizard on the same machine as your AI client. It prompts for the site URL, the Bearer key you generated on the Keys tab, and the clients it should configure:"
COM_YTBMCP_ABOUT_CLIENTS="Supported AI clients"
COM_YTBMCP_ABOUT_CLIENTS_HINT="The setup wizard auto-configures all 9 clients below. Bearer-token + site URL are written to each client's native MCP-config file."
